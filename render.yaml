services:
  - type: web
    name: manovarta-runtime
    env: docker
    dockerfilePath: ./Dockerfile
    autoDeploy: false
    plan: starter
    healthCheckPath: /health
    envVars:
      - key: MANOVARTA_MODEL_PROVIDER
        value: local
      - key: MANOVARTA_CHAT_MODEL
        value: /models/qwen2.5-0.5b-instruct
      - key: MANOVARTA_EXTRACTION_MODEL
        value: /models/qwen2.5-0.5b-instruct
